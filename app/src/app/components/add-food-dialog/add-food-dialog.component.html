<h2 mat-dialog-title>{{ isEdit ? 'Edit food' : 'Add food' }}</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Serving time</mat-label>
      <mat-select formControlName="servingTime">
        @for (st of servingTimes; track st) {
          <mat-option [value]="st">{{ st }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <div class="nutrient-row">
      <mat-form-field appearance="outline">
        <mat-label>Calories</mat-label>
        <input matInput type="number" min="0" formControlName="calories" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Sodium (mg)</mat-label>
        <input matInput type="number" min="0" formControlName="sodium" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Protein (g)</mat-label>
        <input matInput type="number" min="0" formControlName="protein" />
      </mat-form-field>
    </div>
    <div class="nutrient-row">
      <mat-form-field appearance="outline">
        <mat-label>Total carbs (g)</mat-label>
        <input matInput type="number" min="0" formControlName="totalCarbs" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Fiber (g)</mat-label>
        <input matInput type="number" min="0" formControlName="fiberCarbs" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Net carbs (g)</mat-label>
        <input matInput type="number" min="0" formControlName="netCarbs" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Sugar (g)</mat-label>
        <input matInput type="number" min="0" formControlName="sugarCarbs" />
      </mat-form-field>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
      {{ isEdit ? 'Save' : 'Add' }}
    </button>
  </mat-dialog-actions>
</form>
