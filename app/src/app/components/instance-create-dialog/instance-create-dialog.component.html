<h2 mat-dialog-title>New meal instance</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Template</mat-label>
    <input
      matInput
      type="text"
      [ngModel]="templateInputValue()"
      (ngModelChange)="onTemplateInputChange($event)"
      [matAutocomplete]="templateAutocomplete"
      placeholder="Type to search templates"
      autocomplete="off"
    />
    <mat-autocomplete
      #templateAutocomplete="matAutocomplete"
      [displayWith]="displayTemplateName"
      (optionSelected)="onTemplateOptionSelected($event.option.value)"
    >
      @for (t of filteredTemplateOptions(); track t.id) {
        <mat-option [value]="t">{{ t.name }}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Date</mat-label>
    <input
      matInput
      [matDatepicker]="datePicker"
      [ngModel]="dateValue()"
      (ngModelChange)="dateValue.set($event)"
    />
    <mat-datepicker-toggle matIconSuffix [for]="datePicker" />
    <mat-datepicker #datePicker />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Meal name</mat-label>
    <input matInput [ngModel]="name()" (ngModelChange)="name.set($event)" />
  </mat-form-field>

  @if (itemRows().length > 0) {
    <p class="items-heading">Servings per food</p>
    <div class="items-list" role="list">
      @for (row of itemRows(); track row.foodId) {
        <div class="item-row" role="listitem">
          <span class="item-name">{{ row.name }}</span>
          <mat-form-field appearance="outline" class="servings">
            <mat-label>Servings</mat-label>
            <input
              matInput
              type="number"
              min="0"
              step="0.25"
              [ngModel]="row.servings"
              (ngModelChange)="setServings(row.foodId, $event)"
            />
          </mat-form-field>
        </div>
      }
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="!canSave()">
    Save
  </button>
</mat-dialog-actions>
