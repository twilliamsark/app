<h2 mat-dialog-title>{{ data.id ? 'Edit template' : 'New template' }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Template name</mat-label>
    <input matInput [ngModel]="name()" (ngModelChange)="name.set($event)" />
  </mat-form-field>

  <div class="add-row">
    <mat-form-field appearance="outline" class="food-select">
      <mat-label>Add food</mat-label>
      <input
        matInput
        type="text"
        [ngModel]="addFoodInputValue()"
        (ngModelChange)="onAddFoodInputChange($event)"
        [matAutocomplete]="addFoodAutocomplete"
        placeholder="Type to search foods"
        autocomplete="off"
      />
      <mat-autocomplete
        #addFoodAutocomplete="matAutocomplete"
        [displayWith]="displayFoodName"
        (optionSelected)="onAddFoodOptionSelected($event.option.value)"
      >
        @for (f of filteredFoodOptions(); track f.id) {
          <mat-option [value]="f">{{ f.name }}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="addItem()" type="button">Add</button>
  </div>

  <div class="items-list" role="list">
    @for (row of itemRows(); track row.foodId) {
      <div class="item-row" role="listitem">
        <span class="item-name">{{ row.name }}</span>
        <mat-form-field appearance="outline" class="servings">
          <mat-label>Servings</mat-label>
          <input
            matInput
            type="number"
            min="0"
            step="0.25"
            [ngModel]="row.servings"
            (ngModelChange)="setServings(row.foodId, $event)"
          />
        </mat-form-field>
        <button mat-icon-button (click)="removeItem(row.foodId)" type="button" aria-label="Remove">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    }
  </div>

  @if (!data.id) {
    <div class="create-meal-option">
      <mat-checkbox [ngModel]="createMeal()" (ngModelChange)="createMeal.set($event)">
        Make a meal from this template after saving
      </mat-checkbox>
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
