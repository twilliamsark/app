<h2 mat-dialog-title>{{ data.id ? 'Edit template' : 'New template' }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Template name</mat-label>
    <input matInput [ngModel]="name()" (ngModelChange)="name.set($event)" />
  </mat-form-field>

  <div class="add-row">
    <mat-form-field appearance="outline" class="food-select">
      <mat-label>Add food</mat-label>
      <mat-select [ngModel]="selectedFoodIdToAdd()" (ngModelChange)="selectedFoodIdToAdd.set($event)">
        <mat-option [value]="null">—</mat-option>
        @for (f of foodOptions(); track f.id) {
          <mat-option [value]="f.id">{{ f.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="addItem()" type="button">Add</button>
  </div>

  <div class="items-list" role="list">
    @for (row of itemRows(); track row.foodId) {
      <div class="item-row" role="listitem">
        <span class="item-name">{{ row.name }}</span>
        <mat-form-field appearance="outline" class="servings">
          <mat-label>Servings</mat-label>
          <input
            matInput
            type="number"
            min="0"
            step="0.25"
            [ngModel]="row.servings"
            (ngModelChange)="setServings(row.foodId, $event)"
          />
        </mat-form-field>
        <button mat-icon-button (click)="removeItem(row.foodId)" type="button" aria-label="Remove">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
